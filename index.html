<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Domain For Sale</title>
  <style>
    {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu: sans-serif;
      background-color: #0a1a1a;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 2rem;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 600px;
    }
    h1 {
      font-size: 3rem;
      font-weight: 300;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
      color: #f5f5f5;
    }
    p {
      font-size: 1.125rem;
      color: #888888;
      font-weight: 300;
      line-height: 1.6;
    }
    .btn-group {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .contact-link {
      display: inline-block;
      padding: 1rem 2rem;
      background: transparent;
      border: 1px solid #333333;
      color: #ffffff;
      text-decoration: none;
      font-size: 1rem;
      transition: all 0.3s ease;
      border-radius: 4px;
    }
    .contact-link:hover {
      border-color: #666666;
      background: #111111;
    }
    .primary {
      background: #ffffff;
      color: #0a1a1a;
      border-color: #ffffff;
    }
    .primary:hover {
      background: #e5e5e5;
      color: #0a1a1a;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Domain For Sale</h1>
    <p>Interested? Keep in touch.</p>
    <div class="btn-group">
      <a href="https://wa.me/32477038879" class="contact-link primary">Contact WhatsApp</a>
      <a href="tel:32477038879" class="contact-link">Call/SMS</a>
    </div>
  </div>
</body>
</html>
