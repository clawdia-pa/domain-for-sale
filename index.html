<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain For Sale</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --border: #2a2a2a;
            --text: #f5f5f5;
            --text-muted: #666666;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 2rem;
            padding: 2rem;
        }

        .container {
            text-align: center;
            max-width: 720px;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1.125rem;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
        }

        .domain-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .domain-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            text-decoration: none;
            color: var(--text);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .domain-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: transparent;
            transition: background 0.2s ease;
        }

        .domain-card:hover {
            border-color: #404040;
            transform: translateY(-2px);
        }

        .domain-card.selected {
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.05);
        }

        .domain-card.selected::before {
            background: var(--accent);
        }

        .domain-card.selected .domain-name {
            color: var(--accent);
        }

        .domain-name {
            font-size: 1.125rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
        }

        .domain-status {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .domain-card.selected .domain-status {
            color: var(--accent);
        }

        .cta {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
            padding: 1rem 2rem;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .cta:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .price {
            margin-top: 2rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Premium Domains For Sale</h1>
        <p class="subtitle">Select a domain to learn more</p>
        
        <div class="domain-grid" id="domainGrid"></div>

        <a href="https://wa.me/32477038879" class="cta">
            Contact Us
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
        </a>

        <p class="price">All domains include full DNS control</p>
    </div>

    <script>
        const domains = [
            { name: 'humanpayments.ai', label: 'AI Payments' },
            { name: 'huureenmens.ai', label: 'Dutch - Rent a Human' },
            { name: 'rentadutchman.com', label: 'English' },
            { name: 'rentadutchmen.com', label: 'English (Plural)' },
            { name: 'rentafrenchman.com', label: 'French' },
            { name: 'rentagerman.com', label: 'German' }
        ];

        const currentDomain = window.location.hostname;

        const grid = document.getElementById('domainGrid');
        
        domains.forEach(domain => {
            const isSelected = domain.name === currentDomain;
            const card = document.createElement('a');
            card.href = 'https://' + domain.name;
            card.className = 'domain-card' + (isSelected ? ' selected' : '');
            card.innerHTML = '<div class="domain-name">' + domain.name + '</div><div class="domain-status">' + (isSelected ? '✓ Selected' : domain.label) + '</div>';
            grid.appendChild(card);
        });

        // If current domain is not in our list, select the first one
        if (!domains.find(d => d.name === currentDomain)) {
            if (grid.firstChild) {
                grid.firstChild.classList.add('selected');
                grid.firstChild.querySelector('.domain-status').textContent = '✓ Selected';
            }
        }
    </script>
</body>
</html>
