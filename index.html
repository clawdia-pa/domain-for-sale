<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain For Sale</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            flex-direction: column;
            padding: 3rem 2rem;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
            color: #f5f5f5;
        }

        p {
            font-size: 1.125rem;
            color: #666666;
            font-weight: 300;
            line-height: 1.6;
            margin-bottom: 3rem;
        }

        .domain-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto 3rem auto;
            min-height: 60vh;
            align-content: start;
        }

        @media (max-width: 768px) {
            .domain-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .domain-card {
            background: #111111;
            border: 1px solid #222222;
            border-radius: 8px;
            padding: 2rem 1.5rem;
            text-decoration: none;
            color: #ffffff;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 120px;
        }

        .domain-card:hover {
            border-color: #444444;
            background: #151515;
        }

        .domain-card.selected {
            border-color: #666666;
            background: #1a1a1a;
        }

        .domain-card.selected .domain-name {
            color: #ffffff;
        }

        .domain-name {
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
        }

        .domain-status {
            font-size: 0.75rem;
            color: #555555;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .domain-card.selected .domain-status {
            color: #888888;
        }

        .cta {
            display: inline-block;
            margin-top: 1rem;
            padding: 1rem 2.5rem;
            background: transparent;
            border: 1px solid #333333;
            color: #ffffff;
            text-decoration: none;
            font-size: 1rem;
            transition: all 0.3s ease;
            border-radius: 4px;
        }

        .cta:hover {
            border-color: #666666;
            background: #111111;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>This Domain is For Sale</h1>
        <p>Interested? Get in touch.</p>
        
        <div class="domain-grid" id="domainGrid"></div>

        <a href="https://wa.me/32477038879" class="cta">Contact via WhatsApp</a>
    </div>

    <script>
        var domains = [
            { name: 'humanhandover.ai', label: 'AI Handover' },
            { name: 'humanpayments.ai', label: 'AI Payments' },
            { name: 'huureenmens.ai', label: 'Dutch - Rent a Human' },
            { name: 'rentadutchman.com', label: 'English' },
            { name: 'rentadutchmen.com', label: 'English (Plural)' },
            { name: 'rentafrenchman.com', label: 'French' },
            { name: 'rentagerman.com', label: 'German' },
            { name: 'huur-een-mens.nl', label: 'Dutch' },
            { name: 'huur-een-mens.online', label: 'Dutch' },
            { name: 'huureenbelg.be', label: 'Belgian' },
            { name: 'huureenmens.be', label: 'Belgian' },
            { name: 'huureennederlander.nl', label: 'Dutch' },
            { name: 'huureennederlander.online', label: 'Dutch' },
            { name: 'louer-un-humain.fr', label: 'French' },
            { name: 'louerunfrancais.fr', label: 'French' }
        ];

        var currentDomain = window.location.hostname;

        var grid = document.getElementById('domainGrid');
        
        domains.forEach(function(domain) {
            var isSelected = domain.name === currentDomain;
            var card = document.createElement('a');
            card.href = 'https://' + domain.name;
            card.className = 'domain-card' + (isSelected ? ' selected' : '');
            card.innerHTML = '<div class="domain-name">' + domain.name + '</div><div class="domain-status">' + (isSelected ? 'selected' : domain.label) + '</div>';
            grid.appendChild(card);
        });

        if (!domains.find(function(d) { return d.name === currentDomain; })) {
            if (grid.firstChild) {
                grid.firstChild.classList.add('selected');
            }
        }
    </script>
</body>
</html>
